<!doctype html>

    <!-- TEMPORAL (debug Nivel B): muestra errores JS en pantalla (quitar tras depurar). -->
    <script>
      (function () {
        function show(msg) {
          var d = document.getElementById('__err');
          if (!d) { d = document.createElement('div'); d.id = '__err';
            d.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#b00020;color:#fff;padding:10px;font:12px/1.4 monospace;z-index:999999;white-space:pre-wrap;max-height:60%;overflow:auto';
            (document.body || document.documentElement).appendChild(d); }
          d.textContent += 'ERROR: ' + msg + '\n\n';
        }
        window.addEventListener('error', function (e) { show((e.message || 'error') + '  @ ' + (e.filename || '') + ':' + (e.lineno || '')); });
        window.addEventListener('unhandledrejection', function (e) { var r = e.reason; show('Promise: ' + (r && (r.message || r.stack || r) || r)); });
        // Registro de depuración visible (azul) para el flujo de auth.
        window.__dbg = function (msg) {
          var d = document.getElementById('__dbg');
          if (!d) { d = document.createElement('div'); d.id = '__dbg';
            d.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#003c8f;color:#fff;padding:8px;font:12px/1.4 monospace;z-index:999998;white-space:pre-wrap;max-height:50%;overflow:auto';
            (document.body || document.documentElement).appendChild(d); }
          d.textContent += '· ' + msg + '\n';
        };
      })();
    </script>
