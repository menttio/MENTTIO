name = "menttio-automations"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cron: reemplaza al workflow n8n "Creacion videollamada + pizarra". Cada 15 min el Worker
# crea las videollamadas (Calendar+Meet) de las clases próximas y recupera las grabaciones.
# (markCompletedClasses/cleanupUnpaidPremium/syncAllBookings los ejecuta Base44 nativamente,
# por eso no están aquí.)
[triggers]
crons = ["*/15 * * * *"]

# Variables NO secretas (las secretas se cargan con `wrangler secret put`):
[vars]
# Dominio Workspace y cuenta a impersonar para Gmail/Drive/Admin
GOOGLE_WORKSPACE_DOMAIN = "menttio.com"
GOOGLE_IMPERSONATE = "menttio@menttio.com"
# Carpeta raíz "Profesores" en Drive (para el flujo de subida de archivos)
DRIVE_ROOT_PROFESORES = "1Ytihq4nYRvlFZg-jcHeVJUTuK_VHcXKJ"
# Email interno que recibe avisos (nuevo alumno/profesor, nueva reserva)
MENTTIO_INBOX = "menttio@menttio.com"
# Base URL de las backend functions de Base44 (para los cron).
BASE44_FUNCTIONS_URL = "https://base44.app/api/apps/694471e9c204eb0088437b85/functions"
